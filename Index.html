<style>
  :root{--paper:#f0e7d5;--paper-2:#eadfc9;--ink:#1b1a19;--moss:#6f8d6a;--wood:#b4875b;--sun:#f1d08b;--fade:17s;--spawn-rate:420ms;--max-kanji:58;--center-font-size:clamp(42px,7.2vw,130px);--subtitle-size:clamp(14px,2.1vw,20px);--bg-font-min:18px;--bg-font-max:64px;--rain-density:.6;--rain-drops:70;--rain-min-speed:6s;--rain-max-speed:9s;--rain-wind:10deg}
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;color:var(--ink);font-family:ui-serif,"Noto Serif JP","Hiragino Mincho ProN","Yu Mincho","MS Mincho",Georgia,"Times New Roman",serif;overflow:hidden;background:var(--paper)}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(120% 85% at 50% 10%, rgba(255,255,255,.55) 0%, transparent 60%),radial-gradient(140% 100% at 50% 120%, rgba(0,0,0,.06) 0%, transparent 55%),radial-gradient(100% 100% at 50% 50%, var(--paper) 35%, var(--paper-2) 100%);mix-blend-mode:multiply}
  body::after{content:"";position:fixed;inset:-2%;pointer-events:none;z-index:0;opacity:.18;background-image:url('data:image/svg+xml;utf8,\
   <svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">\
   <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/></filter>\
   <rect width="100%" height="100%" filter="url(%23n)" opacity=".18"/>\
   </svg>');background-size:240px 240px;mix-blend-mode:multiply;animation:grain 13s steps(6,end) infinite}
  @keyframes grain{0%{transform:translate(0,0)}20%{transform:translate(-1%,1%)}40%{transform:translate(1%,-1%)}60%{transform:translate(-.5%,.5%)}80%{transform:translate(.7%,-.4%)}100%{transform:translate(0,0)}}
  .stage{position:relative;width:100%;height:100%;display:grid;place-items:center;isolation:isolate}
  .bg-kanji-layer{position:absolute;inset:0;overflow:hidden;z-index:1;pointer-events:none;perspective:800px}
  .kanji{position:absolute;user-select:none;color:var(--ink);opacity:0;white-space:pre;transform-origin:center;animation:life var(--fade) cubic-bezier(.22,.61,.36,1) forwards;will-change:transform,opacity;mix-blend-mode:multiply;text-shadow:0 1px 0 rgba(255,255,255,.2),0 2px 6px rgba(0,0,0,.06);filter:drop-shadow(0 1px 0 rgba(255,255,255,.18))}
  @keyframes life{0%{opacity:0;transform:translate3d(0,14px,0) scale(.94) rotate(-2deg)}12%{opacity:.25}45%{opacity:.32}70%{opacity:.22;transform:translate3d(0,-6px,0) scale(1.02) rotate(2deg)}100%{opacity:0;transform:translate3d(0,-14px,0) scale(1.045)}}
  .rain-layer{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden}
  .drop{position:absolute;top:-12vh;width:1.5px;border-radius:2px;opacity:calc(0.25 * var(--rain-density));background:linear-gradient(to bottom,rgba(255,255,255,0) 0%,rgba(255,255,255,.35) 15%,rgba(27,26,25,.45) 100%);filter:blur(.2px);transform:rotate(var(--rain-wind));animation:fall var(--speed) linear var(--delay) infinite;mix-blend-mode:multiply}
  @keyframes fall{0%{transform:translate3d(0,-12vh,0) rotate(var(--rain-wind))}100%{transform:translate3d(0,112vh,0) rotate(var(--rain-wind))}}
  .center{position:relative;z-index:3;display:grid;place-items:center;text-align:center;padding:1.2rem 2rem}
  .jp{font-size:var(--center-font-size);line-height:1.04;letter-spacing:.03em;font-weight:800;color:var(--ink);position:relative;text-shadow:0 2px 0 rgba(255,255,255,.35),0 10px 24px rgba(0,0,0,.12);animation:breathe 6s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:translateZ(0) scale(1)}50%{transform:translateZ(0) scale(1.02)}}
  .jp::after{content:"";display:inline-block;width:.065em;height:1em;background:var(--ink);margin-left:.08em;vertical-align:-.1em;animation:caret .9s steps(1,end) infinite}
  @keyframes caret{0%,49%{opacity:1}50%,100%{opacity:0}}

/* === Theme toggle (light/dark) ===================================== */
:root[data-theme="light"], :root:not([data-theme]){ /* default: light */
  --paper:#f0e7d5; --paper-2:#eadfc9; --ink:#1b1a19;
}
:root[data-theme="dark"]{
  --paper:#151411; --paper-2:#1d1b17; --ink:#efe9dd;

/* Backgrounds automatically pick up updated variables */
html, body{ background: var(--paper); color: var(--ink); }

<script>
  // TYPEWRITER
  (function(){const c=["文","学"], el=document.getElementById('typewriter');let i=0;function step(){if(i<=c.length){el.textContent=c.slice(0,i).join('');i++;setTimeout(step,i===1?700:800);}else{setTimeout(()=>{i=0;el.textContent='';setTimeout(step,650);},4200)}}step();})();
  // BG KANJI
  (function(){const layer=document.getElementById('bg-layer');const K=["文","学","詩","書","語","言","想","夢","道","和","森","風","花","月","雨","光","静","音","読","知","心","川","山","空","海","時","章","句","章","紙"];const MAX=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--max-kanji'),10)||58;const spawn=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--spawn-rate').trim())||420;const fade=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--fade'))||17;const pick=a=>a[Math.floor(Math.random()*a.length)];window.addEventListener('mousemove',e=>{const {innerWidth:w,innerHeight:h}=window;const mx=(e.clientX/w-.5), my=(e.clientY/h-.5);layer.style.transform=`translate(${mx*6}px, ${my*6}px)`});function one(){if(!document.body.contains(layer))return;if(layer.childElementCount>=MAX)layer.firstElementChild?.remove();const s=document.createElement('span');s.className='kanji';s.textContent=pick(K);const x=Math.random()*92+4,y=Math.random()*88+6;const styles=getComputedStyle(document.documentElement);const fmin=parseFloat(styles.getPropertyValue('--bg-font-min'))||18;const fmax=parseFloat(styles.getPropertyValue('--bg-font-max'))||64;const size=Math.random()*(fmax-fmin)+fmin;const rot=Math.random()*20-10;const z=Math.random()*120-60;const scale=1+z/600;const dur=fade*(Math.random()*.45+.8);const d=Math.random()*2.2;s.style.left=x+'vw';s.style.top=y+'vh';s.style.fontSize=size+'px';s.style.transform=`translate(-50%, -50%) translateZ(${z}px) scale(${scale}) rotate(${rot}deg)`;s.style.animationDuration=dur+'s';s.style.animationDelay=d+'s';const ink=Math.floor(Math.random()*(28-12)+12);s.style.color=`rgb(${ink},${ink},${ink})`;layer.appendChild(s);setTimeout(()=>s.remove(),(d+dur)*1000+200)}const t=setInterval(one,spawn);for(let i=0;i<14;i++)one();window.addEventListener('beforeunload',()=>clearInterval(t));})();
  // RAIN
  (function(){const layer=document.getElementById('rain-layer');const root=getComputedStyle(document.documentElement);const drops=parseInt(root.getPropertyValue('--rain-drops'))||70;const minS=parseFloat(root.getPropertyValue('--rain-min-speed'))||6;const maxS=parseFloat(root.getPropertyValue('--rain-max-speed'))||9;const wind=root.getPropertyValue('--rain-wind')||'10deg';function drop(){const el=document.createElement('i');el.className='drop';const x=Math.random()*100,h=Math.random()*14+8;const delay=(Math.random()*3).toFixed(2)+'s';const speed=(Math.random()*(maxS-minS)+minS).toFixed(2)+'s';el.style.left=x+'vw';el.style.height=h+'vh';el.style.setProperty('--delay',delay);el.style.setProperty('--speed',speed);el.style.setProperty('--rain-wind',wind);el.style.opacity=(0.15+Math.random()*0.15)*(parseFloat(root.getPropertyValue('--rain-density'))||0.6);layer.appendChild(el);const total=(parseFloat(speed)+parseFloat(delay))*1000;setTimeout(()=>{el.remove();if(document.body.contains(layer))drop();},total)}for(let i=0;i<drops;i++)setTimeout(drop,Math.random()*2000);window.addEventListener('beforeunload',()=>{layer.innerHTML=''});} )();
  // NAV
  (function(){
    const btn=document.getElementById('hamburgerBtn');
    const panel=document.getElementById('siteMenu');
    const overlay=document.getElementById('navOverlay');
    let anim=false;
    function open(){ if(anim) return; anim=true; panel.hidden=false; overlay.hidden=false; requestAnimationFrame(()=>{ panel.classList.add('is-open'); overlay.classList.add('is-open'); btn.setAttribute('aria-expanded','true'); const first=panel.querySelector('a'); first&&first.focus(); }); }
    function close(){ if(anim) return; anim=true; panel.classList.remove('is-open'); overlay.classList.remove('is-open'); btn.setAttribute('aria-expanded','false'); }
    function onEnd(e){ if(e.target!==panel) return; if(!panel.classList.contains('is-open')){ panel.hidden=true; overlay.hidden=true; btn.focus(); } anim=false; }
    function toggle(){ (btn.getAttribute('aria-expanded')==='true')?close():open(); }
    function onDoc(e){ if(!panel.hidden && !panel.contains(e.target) && e.target!==btn){ close(); } }
    function onKey(e){ if(e.key==='Escape'){ e.preventDefault(); close(); } }
    btn.addEventListener('click',toggle); btn.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); toggle(); }});
    document.addEventListener('click',onDoc); document.addEventListener('keydown',onKey);
    panel.addEventListener('transitionend',onEnd); overlay.addEventListener('click',close);
  })();
  // Footer: anno corrente
  (function(){ const y=document.getElementById('year'); if(y){ y.textContent = new Date().getFullYear(); } })();
  </script>
<script>
  // Theme: init from localStorage or system, and toggle
  (function(){
    const root = document.documentElement;
    const storageKey = 'theme-preference';
    const btn = document.getElementById('themeToggle');

    function getPreference(){
      const stored = localStorage.getItem(storageKey);
      if(stored) return stored; // 'light' | 'dark'
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    function applyTheme(theme){ root.setAttribute('data-theme', theme); }

    let current = getPreference();
    applyTheme(current);

    if(btn){
      btn.addEventListener('click', ()=>{
        current = (current === 'dark') ? 'light' : 'dark';
        applyTheme(current);
        localStorage.setItem(storageKey, current);
      });
    }

    // Update if system preference changes (when user has no explicit choice)
    try{
      const mql = window.matchMedia('(prefers-color-scheme: dark)');
      mql.addEventListener('change', (e)=>{
        if(!localStorage.getItem(storageKey)){
          current = e.matches ? 'dark' : 'light';
          applyTheme(current);
        }
      });
    }catch(err){}
  })();
</script></body>
