<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>文学 — Tema Ghibli con pioggia leggera</title>
  <style>
    :root{
      /* === Palette "Ghibli-like" === */
      --paper: #f0e7d5;
      --paper-2: #eadfc9;
      --ink: #1b1a19;
      --moss: #6f8d6a;
      --wood: #b4875b;
      --sun:  #f1d08b;

      /* === Parametri dinamica kanji === */
      --fade: 17s;
      --spawn-rate: 420ms;
      --max-kanji: 58;

      /* Tipografie */
      --center-font-size: clamp(42px, 7.2vw, 130px);
      --subtitle-size: clamp(14px, 2.1vw, 20px);
      --bg-font-min: 18px;
      --bg-font-max: 64px;

      /* === Pioggia (tuning veloce) === */
      --rain-density: 0.6;   /* 0.0–1.0: quanto fitta (modula opacità) */
      --rain-drops: 70;      /* quante gocce attive contemporaneamente */
      --rain-min-speed: 6s;  /* durata min caduta */
      --rain-max-speed: 9s;  /* durata max caduta */
      --rain-wind: 10deg;    /* inclinazione vento */
    }

    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      color: var(--ink);
      font-family: ui-serif, "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho",
                   "MS Mincho", Georgia, "Times New Roman", serif;
      overflow: hidden;
      background: var(--paper);
    }

    /* === Carta + vignettatura soft === */
    body::before{
      content:"";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(120% 85% at 50% 10%, rgba(255,255,255,.55) 0%, transparent 60%),
        radial-gradient(140% 100% at 50% 120%, rgba(0,0,0,.06) 0%, transparent 55%),
        radial-gradient(100% 100% at 50% 50%, var(--paper) 35%, var(--paper-2) 100%);
      mix-blend-mode: multiply;
    }

    /* === Grana tipo pellicola (noise) === */
    body::after{
      content:"";
      position: fixed;
      inset: -2%;
      pointer-events: none;
      z-index: 0;
      opacity: .18;
      background-image: url('data:image/svg+xml;utf8,\
        <svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">\
          <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/></filter>\
          <rect width="100%" height="100%" filter="url(%23n)" opacity=".18"/>\
        </svg>');
      background-size: 240px 240px;
      mix-blend-mode: multiply;
      animation: grain 13s steps(6, end) infinite;
    }
    @keyframes grain {
      0% { transform: translate(0,0) }
      20%{ transform: translate(-1%, 1%) }
      40%{ transform: translate(1%, -1%) }
      60%{ transform: translate(-.5%, .5%) }
      80%{ transform: translate(.7%, -.4%) }
      100%{ transform: translate(0,0) }
    }

    /* === Palco === */
    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    /* Kanji di sfondo */
    .bg-kanji-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 1;           /* sotto pioggia */
      pointer-events: none;
      perspective: 800px;
    }
    .kanji {
      position: absolute;
      user-select: none;
      color: var(--ink);
      opacity: 0;
      white-space: pre;
      transform-origin: center;
      animation: life var(--fade) cubic-bezier(.22,.61,.36,1) forwards;
      will-change: transform, opacity;
      mix-blend-mode: multiply;
      text-shadow:
        0 1px 0 rgba(255,255,255,.2),
        0 2px 6px rgba(0,0,0,.06);
      filter: drop-shadow(0 1px 0 rgba(255,255,255,.18));
    }
    @keyframes life {
      0%   { opacity: 0; transform: translate3d(0, 14px, 0) scale(.94) rotate(-2deg); }
      12%  { opacity: .25; }
      45%  { opacity: .32; }
      70%  { opacity: .22; transform: translate3d(0, -6px, 0) scale(1.02) rotate(2deg); }
      100% { opacity: 0; transform: translate3d(0, -14px, 0) scale(1.045) rotate(0deg); }
    }

    /* === Layer pioggia === */
    .rain-layer{
      position: absolute;
      inset: 0;
      z-index: 2;           /* sopra i kanji, sotto il titolo */
      pointer-events: none;
      overflow: hidden;
    }
    .drop{
      position: absolute;
      top: -12vh;                 /* parte poco sopra il viewport */
      width: 1.5px;
      border-radius: 2px;
      opacity: calc(0.25 * var(--rain-density));
      /* “lucentezza” delicata della goccia */
      background: linear-gradient(to bottom,
                  rgba(255,255,255,.0) 0%,
                  rgba(255,255,255,.35) 15%,
                  rgba(27,26,25,.45) 100%);
      filter: blur(.2px);
      transform: rotate(var(--rain-wind));
      animation: fall var(--speed) linear var(--delay) infinite;
      /* leggera variazione di blending per atmosfera */
      mix-blend-mode: multiply;
    }
    @keyframes fall{
      0%   { transform: translate3d(0, -12vh, 0) rotate(var(--rain-wind)); }
      100% { transform: translate3d(0, 112vh, 0) rotate(var(--rain-wind)); }
    }

    /* === Centro (titolo) === */
    .center {
      position: relative;
      z-index: 3;   /* sopra la pioggia */
      display: grid;
      place-items: center;
      text-align: center;
      padding: 1.2rem 2rem;
    }
    .jp {
      font-size: var(--center-font-size);
      line-height: 1.04;
      letter-spacing: 0.03em;
      font-weight: 800;
      color: var(--ink);
      position: relative;
      text-shadow:
        0 2px 0 rgba(255,255,255,.35),
        0 10px 24px rgba(0,0,0,.12);
      animation: breathe 6s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: translateZ(0) scale(1); }
      50%      { transform: translateZ(0) scale(1.02); }
    }
    .jp::after {
      content: "";
      display: inline-block;
      width: 0.065em;
      height: 1em;
      background: var(--ink);
      margin-left: 0.08em;
      vertical-align: -0.1em;
      animation: caret 0.9s steps(1, end) infinite;
    }
    @keyframes caret {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .subtitle {
      margin-top: 0.6rem;
      font-size: var(--subtitle-size);
      letter-spacing: 0.04em;
      color: #2a2a2a;
      opacity: .7;
      text-shadow: 0 1px 0 rgba(255,255,255,.35);
    }

    /* Accessibilità: riduci movimento */
    @media (prefers-reduced-motion: reduce) {
      .kanji { animation: none; opacity: .22; }
      .jp::after { display: none; }
      .jp { animation: none; }
      body::after { animation: none; }
      .rain-layer { display: none; } /* niente pioggia */
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Pagina tema Ghibli con background di kanji, pioggia leggera e titolo centrale">
    <div class="bg-kanji-layer" id="bg-layer" aria-hidden="true"></div>

    <!-- ✨ Nuovo: layer pioggia -->
    <div class="rain-layer" id="rain-layer" aria-hidden="true"></div>

    <section class="center">
      <div class="jp" id="typewriter" aria-live="polite"></div>
      <div class="subtitle">L'angolo di lettura giapponese di Mimì</div>
    </section>
  </main>

  <script>
    /***********************
     * 1) TYPEWRITER — 文学
     ***********************/
    (function typewriter(){
      const chars = ["文", "学"];   // “letteratura” (bungaku)
      const el = document.getElementById("typewriter");
      let i = 0;
      function step() {
        if (i <= chars.length) {
          el.textContent = chars.slice(0, i).join("");
          i++;
          const delay = i === 1 ? 700 : 800;
          setTimeout(step, delay);
        } else {
          setTimeout(() => {
            i = 0;
            el.textContent = "";
            setTimeout(step, 650);
          }, 4200);
        }
      }
      step();
    })();

    /*********************************
     * 2) BACKGROUND — Kanji dinamici
     *********************************/
    (function bgKanji(){
      const layer = document.getElementById("bg-layer");
      const KANJI = [
        "文","学","詩","書","語","言","想","夢","道","和",
        "森","風","花","月","雨","光","静","音","読","知",
        "心","川","山","空","海","時","章","句","章","紙"
      ];
      const MAX = parseInt(getComputedStyle(document.documentElement)
                     .getPropertyValue("--max-kanji"), 10) || 58;
      const spawnRateStr = getComputedStyle(document.documentElement)
                     .getPropertyValue("--spawn-rate").trim();
      const spawnRate = parseInt(spawnRateStr) || 420;
      const fadeSec = parseFloat(getComputedStyle(document.documentElement)
                          .getPropertyValue("--fade")) || 17;

      const rand = (min, max) => Math.random() * (max - min) + min;
      const pick = arr => arr[Math.floor(Math.random() * arr.length)];

      // Parallax lieve sul mouse
      window.addEventListener("mousemove", (e)=>{
        const { innerWidth:w, innerHeight:h } = window;
        const mouseX = (e.clientX / w - .5);
        const mouseY = (e.clientY / h - .5);
        layer.style.transform = `translate(${mouseX * 6}px, ${mouseY * 6}px)`;
      });

      function spawnOne(){
        if (!document.body.contains(layer)) return;
        if (layer.childElementCount >= MAX) layer.firstElementChild?.remove();

        const span = document.createElement("span");
        span.className = "kanji";
        span.textContent = pick(KANJI);

        const x = (Math.random() * 92) + 4;  // 4–96 vw
        const y = (Math.random() * 88) + 6;  // 6–94 vh

        const styles = getComputedStyle(document.documentElement);
        const fontMin = parseFloat(styles.getPropertyValue("--bg-font-min")) || 18;
        const fontMax = parseFloat(styles.getPropertyValue("--bg-font-max")) || 64;
        const size = Math.random() * (fontMax - fontMin) + fontMin;

        const rot = (Math.random() * 20) - 10;
        const z = (Math.random() * 120) - 60;
        const scale = 1 + (z / 600);

        const dur = fadeSec * (Math.random() * 0.45 + 0.8);
        const delay = Math.random() * 2.2;

        span.style.left = x + "vw";
        span.style.top  = y + "vh";
        span.style.fontSize = size + "px";
        span.style.transform =
          `translate(-50%, -50%) translateZ(${z}px) scale(${scale}) rotate(${rot}deg)`;
        span.style.animationDuration = dur + "s";
        span.style.animationDelay = delay + "s";

        const inkVar = Math.floor(Math.random() * (28 - 12) + 12);
        span.style.color = `rgb(${inkVar}, ${inkVar}, ${inkVar})`;

        layer.appendChild(span);
        setTimeout(() => span.remove(), (delay + dur) * 1000 + 200);
      }

      const timer = setInterval(spawnOne, spawnRate);
      for (let i = 0; i < 14; i++) spawnOne();
      window.addEventListener("beforeunload", () => clearInterval(timer));
    })();

    /****************************
     * 3) RAIN — Pioggia leggera
     ****************************/
    (function rain(){
      const layer = document.getElementById("rain-layer");
      const rootStyles = getComputedStyle(document.documentElement);

      const dropsTarget = parseInt(rootStyles.getPropertyValue("--rain-drops")) || 70;
      const minSpeed = parseFloat(rootStyles.getPropertyValue("--rain-min-speed")) || 6;
      const maxSpeed = parseFloat(rootStyles.getPropertyValue("--rain-max-speed")) || 9;
      const wind = rootStyles.getPropertyValue("--rain-wind") || "10deg";

      // Crea un singolo drop
      function createDrop(){
        const el = document.createElement("i");
        el.className = "drop";

        // Posizione e dimensione casuali
        const x = Math.random() * 100;        // vw
        const h = Math.random() * 14 + 8;     // 8–22 vh (lunghezza scia)
        const delay = (Math.random() * 3).toFixed(2) + "s";
        const speed = (Math.random() * (maxSpeed - minSpeed) + minSpeed).toFixed(2) + "s";

        el.style.left = x + "vw";
        el.style.height = h + "vh";
        el.style.setProperty("--delay", delay);
        el.style.setProperty("--speed", speed);
        el.style.setProperty("--rain-wind", wind);

        // Opacità per varietà (molto lieve)
        el.style.opacity = (0.15 + Math.random() * 0.15) * (parseFloat(rootStyles.getPropertyValue("--rain-density")) || 0.6);

        // Inserisci e programma il riciclo
        layer.appendChild(el);
        const total = (parseFloat(speed) + parseFloat(delay)) * 1000;
        setTimeout(() => {
          el.remove();
          // Manteniamo costante la densità
          if (document.body.contains(layer)) createDrop();
        }, total);
      }

      // Prime gocce
      for (let i = 0; i < dropsTarget; i++) {
        // scagliono l'ingresso iniziale
        setTimeout(createDrop, Math.random() * 2000);
      }

      // Adatta con resize (opzionale, qui non necessario perché usiamo vw/vh)
      window.addEventListener("beforeunload", () => {
        layer.innerHTML = "";
      });
    })();
  </script>
</body>
</html>
